# -----------------------------------------------------------------------------
# FONTS
# -----------------------------------------------------------------------------
# Change "Fira Code" to "JetBrains Mono" or "Hack" if you prefer other fonts
font_family      BlexMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        10.0

# -----------------------------------------------------------------------------
# WINDOW LAYOUT & PADDING
# -----------------------------------------------------------------------------
# Adds a bit of breathing room around the edges of the terminal window
window_padding_width 8
remember_window_size  no
initial_window_width  950
initial_window_height 600

# -----------------------------------------------------------------------------
# MOUSE & SCROLLING
# -----------------------------------------------------------------------------
scrollback_lines 5000
mouse_hide_wait  3.0
url_color        #0087bd
url_style        curly

# -----------------------------------------------------------------------------
# COLOR SCHEME (Nord / Dark Slate Hybrid)
# -----------------------------------------------------------------------------
background            #000000
foreground            #ababab
background_opacity    1.0

# Black
color0  #1e222a
color8  #545862

# Red
color1  #e06c75
color9  #e06c75

# Green
color2  #98c379
color10 #98c379

# Yellow
color3  #d19a66
color11 #d19a66

# Blue
color4  #61afef
color12 #61afef

# Magenta
color5  #c678dd
color13 #c678dd

# Cyan
color6  #56b6c2
color14 #56b6c2

# White
color7  #abb2bf
color15 #ffffff

# -----------------------------------------------------------------------------
# ADVANCED / BELL
# -----------------------------------------------------------------------------
# Disables the annoying system audio beep on errors
enable_audio_bell no
