[redshift]
; Set the day and night screen temperatures (in Kelvin)
temp-day=5500
temp-night=2500

; Enable a smooth transition when changing states
transition=1

; Set the adjustment method to 'randr' for modern X11 setups
adjustment-method=randr

; Set your location coordinates (Default here is Germany)
; Change these numbers to match your exact city if you want perfect sunset timing!
[manual]
lat=48.1
lon=8.6
